<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Abschluss Party 💸</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f14;
            color: #eaeaea;
            text-align: center;
        }

        .wrap {
            padding-top: 70px;
        }

        .card {
            width: 360px;
            margin: auto;
            background: #1b1b22;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .small {
            opacity: 0.7;
            font-size: 13px;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 12px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4da3ff;
            color: white;
            font-size: 15px;
        }

        button:hover {
            background: #2f8cff;
        }

        .sum {
            margin: 18px 0;
            font-size: 22px;
            font-weight: bold;
        }

        .note {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div class="wrap">
    <div class="card">
        <h1>Abschluss Party 💸</h1>
        <div class="small">wir sammeln bisschen Geld für die Party (bitte kein Stress 😄)</div>

        <div class="sum" id="summe">Gesammelt: 0 €</div>

        <input type="number" id="betrag" placeholder="wie viel €?">
        <br>

        <button onclick="addMoney()">dazu packen</button>
        <button onclick="resetAll()">reset</button>

        <div class="note">*ja das ist nur ein kleiner Schul-Ding</div>
    </div>
</div>

<script>
    let total = localStorage.getItem("money_total");
    total = total ? parseFloat(total) : 0;

    update();

    function addMoney() {
        let v = parseFloat(document.getElementById("betrag").value);

        if (!v || v <= 0) {
            alert("bitte gültige Zahl eingeben");
            return;
        }

        total += v;
        localStorage.setItem("money_total", total);

        update();
        document.getElementById("betrag").value = "";

        // 💥 BIG CONFETTI CHAOS MODE
        megaConfetti();
    }

    function update() {
        document.getElementById("summe").innerText =
            "Gesammelt: " + total.toFixed(2) + " €";
    }

    function resetAll() {
        if (confirm("wirklich alles löschen?")) {
            total = 0;
            localStorage.setItem("money_total", total);
            update();
        }
    }

    // 🎉 ridiculous confetti explosion
    function megaConfetti() {

        let duration = 2500;
        let end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 6,
                spread: 120,
                startVelocity: 45,
                gravity: 0.8,
                ticks: 200
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        })();

        // extra bursts
        setTimeout(() => {
            confetti({ particleCount: 200, spread: 160 });
        }, 200);

        setTimeout(() => {
            confetti({ particleCount: 300, spread: 200 });
        }, 600);

        setTimeout(() => {
            confetti({ particleCount: 400, spread: 360 });
        }, 1000);
    }
</script>

</body>
</html>
