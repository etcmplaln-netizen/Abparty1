<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Abschluss Party 💸</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f14;
            color: #eaeaea;
            text-align: center;
        }

        .wrap {
            padding-top: 70px;
        }

        .card {
            width: 360px;
            margin: auto;
            background: #1b1b22;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .small {
            opacity: 0.7;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 12px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4da3ff;
            color: white;
            font-size: 15px;
        }

        button:hover {
            background: #2f8cff;
        }

        .sum {
            margin: 18px 0;
            font-size: 22px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div class="wrap">

    <!-- ГЛАВНАЯ -->
    <div class="card" id="mainPage">
        <h1>Abschluss Party 💸</h1>
        <div class="small">wir sammeln Geld für Abschlussparty</div>

        <div class="sum" id="summe">Gesammelt: 0 €</div>

        <input type="number" id="betrag" placeholder="wie viel €?">
        <br>

        <button onclick="addMoney()">einzahlen</button>
        <button onclick="resetAll()">reset</button>
        <br>
        <button onclick="showInfo()">Info</button>
    </div>

    <!-- ИНФО -->
    <div class="card hidden" id="infoPage">
        <h1>📍 Party Infos</h1>

        <div class="small">
            ⏰ Zeit: 19.06.2026 um 17:30 Uhr<br><br>
            📍 Ort: Albtraaum Herold Center Norderstedt<br><br>
            👥 Organisatoren:<br>
            Robin & Linnea
        </div>

        <button onclick="showMain()">zurück</button>
    </div>

</div>

<script>
    let total = localStorage.getItem("money_total");
    total = total ? parseFloat(total) : 0;

    update();

    function addMoney() {
        let v = parseFloat(document.getElementById("betrag").value);

        if (!v || v <= 0) {
            alert("bitte gültige Zahl eingeben");
            return;
        }

        total += v;
        localStorage.setItem("money_total", total);

        update();
        document.getElementById("betrag").value = "";

        megaConfetti();
    }

    function update() {
        document.getElementById("summe").innerText =
            "Gesammelt: " + total.toFixed(2) + " €";
    }

    function resetAll() {
        if (confirm("wirklich alles löschen?")) {
            total = 0;
            localStorage.setItem("money_total", total);
            update();
        }
    }

    function showInfo() {
        document.getElementById("mainPage").classList.add("hidden");
        document.getElementById("infoPage").classList.remove("hidden");
    }

    function showMain() {
        document.getElementById("infoPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
    }

    function megaConfetti() {

        let duration = 6000;
        let end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 10,
                spread: 180,
                startVelocity: 50,
                gravity: 0.9,
                ticks: 300,
                scalar: 1.2
            });

            confetti({
                particleCount: 6,
                spread: 360,
                startVelocity: 35
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        })();

        setTimeout(() => {
            confetti({ particleCount: 250, spread: 200 });
            confetti({ particleCount: 250, spread: 200 });
        }, 300);

        setTimeout(() => {
            confetti({ particleCount: 400, spread: 240 });
            confetti({ particleCount: 400, spread: 240 });
        }, 900);

        setTimeout(() => {
            confetti({ particleCount: 600, spread: 360 });
            confetti({ particleCount: 600, spread: 360 });
        }, 1500);

        setTimeout(() => {
            confetti({ particleCount: 800, spread: 360 });
        }, 2200);
    }
</script>

</body>
</html>
